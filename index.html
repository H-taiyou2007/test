<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウンチ</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    position: relative;
  }

  .flash{
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 10;
    animation: flashOut 0.6s ease forwards;
  }

  @keyframes flashOut{
    0%{ opacity: 1; }
    100%{ opacity: 0; visibility: hidden; }
  }

  .stage{
    animation: shake 0.5s ease;
  }

  @keyframes shake{
    0%,100%{ transform: translate(0,0); }
    20%{ transform: translate(-10px,6px); }
    40%{ transform: translate(10px,-6px); }
    60%{ transform: translate(-8px,-4px); }
    80%{ transform: translate(8px,4px); }
  }

  h1{
    font-size: min(28vw, 320px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.05em;
    font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    text-shadow:
      0 0 20px #6b3e26,
      0 0 60px #ffb703,
      0 0 120px #ff6b00;
    animation: pop 0.7s cubic-bezier(.2,1.6,.4,1) 0.15s both,
               glow 1.8s ease-in-out infinite 0.9s;
  }

  @keyframes pop{
    0%{ transform: scale(0.2) rotate(-8deg); opacity: 0; }
    70%{ transform: scale(1.15) rotate(2deg); opacity: 1; }
    100%{ transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes glow{
    0%,100%{
      text-shadow:
        0 0 20px #6b3e26,
        0 0 60px #ffb703,
        0 0 120px #ff6b00;
    }
    50%{
      text-shadow:
        0 0 40px #6b3e26,
        0 0 100px #ffd166,
        0 0 200px #ff8c00;
    }
  }

  .rays{
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    background: repeating-conic-gradient(from 0deg, rgba(255,180,0,0.12) 0deg 6deg, transparent 6deg 12deg);
    animation: spin 14s linear infinite;
    z-index: 0;
  }

  @media (prefers-reduced-motion: reduce){
    .rays, .stage, h1{ animation: none; }
    .flash{ display: none; }
  }

  @keyframes spin{
    to{ transform: rotate(360deg); }
  }

  .drop{
    position: fixed;
    top: -60px;
    font-size: 34px;
    animation: fall linear forwards;
    z-index: 1;
  }

  @keyframes fall{
    to{ transform: translateY(115vh) rotate(360deg); }
  }
</style>
</head>
<body>

<div class="flash"></div>
<div class="rays"></div>

<div class="stage">
  <h1>うんち</h1>
</div>

<script>
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function spawnDrop(){
    var d = document.createElement('div');
    d.className = 'drop';
    d.textContent = '💩';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.animationDuration = (2.2 + Math.random() * 2) + 's';
    document.body.appendChild(d);
    setTimeout(function(){ d.remove(); }, 4500);
  }

  if(!reduce){
    setInterval(spawnDrop, 220);
  }
</script>

</body>
</html>
